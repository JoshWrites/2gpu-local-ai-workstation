# Override Ubuntu 24.04's default (shipped in /etc/sysctl.d/10-apparmor.conf).
# The default =1 closes a sandbox-escape surface (CVE-2023-2640-class) but
# also triggers kernel traps in Electron apps during window transitions like
# VSCodium's "Open Folder". On a single-user dev workstation the tradeoff is
# acceptable; on a multi-user or internet-exposed host, prefer a targeted
# AppArmor profile for the specific Electron binary instead.
kernel.apparmor_restrict_unprivileged_userns=0
