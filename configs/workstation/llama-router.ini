# llama-server router-mode model preset.
#
# Install location: /etc/workstation/llama-router.ini
# Owner: root, mode 0644 (world-readable; no secrets, just flag values).
# Read by: llama-primary-router.service via --models-preset.
#
# Each [section] declares a swappable model. The section name is the
# model id at the API level (what you put in `model` on /v1/chat/completions
# and what `--alias` would set if loading directly). Keys are llama-server
# CLI flag names without the leading --; values are flag arguments.
# Boolean flags accept on/true.
#
# All flags here have been validated against the production unit-based
# stacks they replace; see docs/research/2026-05-03-router-mode-validation.md
# for the bench data confirming both models load and serve correctly via
# this preset on the HIP build.

[gpt-oss-120b]
# 116.83B param MoE, MXFP4 native, 128K context, MoE expert offload to
# system RAM via --n-cpu-moe. Tuned over the 2026-05-02 evening session;
# every value here has a reason captured in
# docs/research/gpt-oss-120b-moe-offload.md.
model = /var/lib/llama-models/gpt-oss-120b/gpt-oss-120b-mxfp4-00001-of-00003.gguf
alias = gpt-oss-120b
n-gpu-layers = 999
n-cpu-moe = 28
ctx-size = 131072
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0
batch-size = 2048
ubatch-size = 2048
cache-reuse = 256
swa-checkpoints = 64
jinja = true
# Sampler per OpenAI's official recommendation for GPT-OSS. Repetition
# penalties pinned to neutral so opencode's openai-compatible client
# can't override -- non-zero values corrupt Harmony tokens.
temp = 1.0
top-p = 1.0
top-k = 0
min-p = 0.01
repeat-penalty = 1.0
presence-penalty = 0.0
frequency-penalty = 0.0

[gpt-oss-120b-autofit]
# Same model file as [gpt-oss-120b], but lets llama.cpp's auto-fit pick
# n-gpu-layers and per-tensor expert placement instead of the hand-tuned
# --n-cpu-moe 28 / --n-gpu-layers 999 split. PR #16653 (Dec 2025) added
# --fit; auto-fit was not available when the original tuning was done.
#
# Auto-fit explicitly disables itself if either --n-gpu-layers or
# --n-cpu-moe is set, so this preset omits both. fit-target = 1024 MiB
# leaves a 1 GiB VRAM safety margin (matches default). fit-ctx = 131072
# tells the planner to plan KV+compute for the full 128K window.
#
# This section exists for an A/B vs the hand-tuned baseline. If autofit
# wins on bench/oss-tuning.csv, fold its key set back into [gpt-oss-120b]
# and delete this section.
model = /var/lib/llama-models/gpt-oss-120b/gpt-oss-120b-mxfp4-00001-of-00003.gguf
alias = gpt-oss-120b-autofit
fit = on
fit-ctx = 131072
fit-target = 1024
ctx-size = 131072
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0
batch-size = 2048
ubatch-size = 2048
cache-reuse = 256
swa-checkpoints = 64
jinja = true
temp = 1.0
top-p = 1.0
top-k = 0
min-p = 0.01
repeat-penalty = 1.0
presence-penalty = 0.0
frequency-penalty = 0.0

[glm-4.7-flash]
# 30B param dense, Q4_K_XL, 64K context, fully GPU-resident. Faster
# default for short tasks and quick iteration. On the HIP build this
# reaches ~72 tok/s gen vs ~30 tok/s on the Vulkan build it replaces
# (see router-mode-validation.md).
model = /var/lib/llama-models/glm-4.7-flash/GLM-4.7-Flash-UD-Q4_K_XL.gguf
alias = glm-4.7-flash
n-gpu-layers = 99
ctx-size = 65536
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0
jinja = true
# Sampler from Z.AI / unsloth recommended params. min-p = 0.01 added as
# long-session safety net consistent with the OSS config.
temp = 0.7
top-p = 1.0
min-p = 0.01
